<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>髙橋 勇喜 | Game Engineer Portfolio</title>

  <!-- css/main_style.css を読み込む（index.html と同じ階層の css フォルダ） -->
  <link rel="stylesheet" href="css/main_style.css" />

  

</head>
<body>

  <!--
    #app … サイト全体の入れ物（将来、詳細画面などもここに増やす）
    #screen-top … TOP 画面の「箱」。中の要素を CSS で重ねる
  -->
  <div id="app">
    <div id="screen-top" class="screen is-active">

      <!-- レイヤー0: 空（div + CSS の background-image） -->
      <div class="scene-bg" aria-hidden="true">
        <div class="scene-bg__track">
          <img class="scene-bg__tile" src="assets/images/bg.png" alt="" />
          <img class="scene-bg__tile" src="assets/images/bg.png" alt="" />
        </div>
      </div>

      <!-- レイヤー1: 床（透過PNG → 道と土だけ見える） -->
      <img class="scene-floor" src="assets/images/floor.png" alt="" />

      <!-- レイヤー2: キャラ（透過PNG） -->
      <img class="scene-character" src="assets/images/character.png" alt="キャラクター" />

       <!-- レイヤー3: コマンドパネル（TOP のみ表示・Phase 3 で動かす） -->
      <aside class="command-panel" aria-label="RPG風コマンドメニュー">
        <div class="panel-title">Command</div>
        
        <!-- data-screen は Phase 3 の showScreen() で使う名前 -->
        <button type="button" class="command-item" data-screen="about">
          <span>About</span><small>自己紹介</small>
        </button>
        
        <button type="button" class="command-item" data-screen="skills">
          <span>Skills</span><small>技術スタック</small>
        </button>
        
        <button type="button" class="command-item" data-screen="works">
          <span>Works</span><small>制作実績</small>
        </button>

        <button type = "button" class="command-item" data-screen = "timeline">
          <span>TimeLine</span><small>経歴</small>
        </button>
        
        <button type="button" class="command-item" data-screen="contact">
          <span>Contact</span><small>連絡先</small>
        </button>
        
      </aside>

    </div>
  </div>

  <!-- Phase 3 で画面切り替えを入れるときに有効化 -->
  <!-- <script src="js/main.js"></script> -->

</body>
</html>
